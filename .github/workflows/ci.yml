name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (incl. test group)
        run: uv sync --group test

      - name: Lint (ruff)
        run: uvx ruff check src tests

      - name: Format check (ruff)
        run: uvx ruff format --check src tests

      - name: Run tests
        run: uv run pytest -q
